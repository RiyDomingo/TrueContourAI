name: iOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
            /opt/homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install SwiftLint and SwiftFormat
        run: |
          brew update
          brew install swiftlint swiftformat || true

      - name: Lint
        run: |
          swiftlint --strict || true
          swiftformat --lint . || true

      - name: Build and Test
        run: |
          set -euo pipefail
          xcodebuild -project CyborgRugby.xcodeproj -scheme CyborgRugby -destination 'platform=iOS Simulator,name=iPhone 15' -quiet build test | xcpretty || exit 1
        shell: bash

